name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          # Check the main bc-scaffold script
          shellcheck --severity=warning --shell=bash bc-scaffold
          
          # Check any .sh files if they exist
          find . -type f -name "*.sh" -exec shellcheck --severity=warning --shell=bash {} +
