name: OSV Scanner (Reusable)

on:
  workflow_call:
    inputs:
      scan-args:
        description: "Arguments passed to OSV scanner"
        required: false
        type: string
        default: |
          -r
          --skip-git
          ./

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.7.1
        with:
          scan-args: ${{ inputs.scan-args }}