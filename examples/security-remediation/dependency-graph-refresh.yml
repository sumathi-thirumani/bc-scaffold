name: Dependency Graph Refresh (Full Transitive)

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
   contents: write
   security-events: write
   pull-requests: write
   
jobs:
  generate-sbom:
    uses: sumathi-thirumani/bc-scaffold/.github/workflows/dependency-graph-refresh.yml@feature/security-remediation
    with:
      artifact_retention_days: 3